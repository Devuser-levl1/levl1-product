services:
  - type: web
    name: interviewcentral-web
    runtime: node
    rootDir: apps/web
    # rm the cached generated client so prisma generate always picks up new schema fields (Render caches node_modules)
    # --include=dev: NODE_ENV=production would otherwise skip devDeps (ts-node/typescript) that the seed + next build need.
    # --accept-data-loss: keep `db push` non-interactive so it never hangs/aborts a deploy (our migrations are additive).
    # seed is wrapped so a seed failure can NEVER block a deploy and leave prod on a stale build.
    buildCommand: npm install --include=dev && rm -rf node_modules/.prisma && npx prisma generate && npx prisma db push --accept-data-loss && (npx prisma db seed || echo "seed skipped (non-fatal)") && npm run build
    startCommand: npm run start
    envVars:
      # Set these in the Render dashboard — never commit values to source control
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: NEXT_PUBLIC_ELEVENLABS_API_KEY
        sync: false
      - key: NEXT_PUBLIC_ELEVENLABS_VOICE_ID
        sync: false
      # Twilio WhatsApp (sandbox for testing). Set values in the dashboard.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      # Optional: protect /api/cron/send-reminders
      - key: CRON_SECRET
        sync: false
      # Internal admin CRM (/admin). Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: ADMIN_SECRET_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
